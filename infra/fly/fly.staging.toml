# =============================================================================
# Fly.io Configuration - STAGING Environment
# =============================================================================
# This file contains NON-SENSITIVE configuration only.
# Sensitive values must be managed via 'fly secrets import'.
#
# To deploy: make -C infra/fly deploy ENV=staging GITHUB_TOKEN="ghp_xxx"
# =============================================================================

app = "billie-crm-staging"
primary_region = "syd"

# =============================================================================
# Build configuration
# =============================================================================

[build]
  dockerfile = "../../Dockerfile.demo"
  # Note: GITHUB_TOKEN must be passed as build secret for private SDKs

# =============================================================================
# Environment variables (NON-SENSITIVE ONLY)
# =============================================================================

[env]
  NODE_ENV = "staging"
  LOG_LEVEL = "info"
  PORT = "3000"
  ENABLE_EVENT_PROCESSING = "true"
  WORKER_ID = "1"
  NEXT_PUBLIC_APP_URL = "https://billie-crm-staging.fly.dev"
  GITHUB_ORG = "BillieLoans"
  SDK_VERSION = "1.0.0"
  LEDGER_SERVICE_URL = "billie-platform-services-staging.internal:50051"

# =============================================================================
# HTTP service configuration
# =============================================================================

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"

# =============================================================================
# Machine configuration
# =============================================================================

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
