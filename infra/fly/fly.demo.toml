# =============================================================================
# Fly.io Configuration - DEMO Environment
# =============================================================================
# This file contains NON-SENSITIVE configuration only.
# Sensitive values must be managed via 'fly secrets import'.
#
# To deploy: make -C infra/fly deploy ENV=demo GITHUB_TOKEN="ghp_xxx"
# =============================================================================

app = "billie-crm-demo"
primary_region = "syd"

# =============================================================================
# Build configuration
# =============================================================================

[build]
  dockerfile = "../../Dockerfile.demo"
  # Note: GITHUB_TOKEN must be passed as build secret:
  # fly deploy --build-secret GITHUB_TOKEN=<token>

# =============================================================================
# Environment variables (NON-SENSITIVE ONLY)
# =============================================================================

[env]
  LOG_LEVEL = "info"
  ENABLE_EVENT_PROCESSING = "true"
  WORKER_ID = "1"
#  NEXT_PUBLIC_APP_URL = "https://billie-crm-demo.fly.dev"
  NEXT_PUBLIC_APP_URL = "https://demo.crm.billie.loans"
  GITHUB_ORG = "BillieLoans"
  SDK_VERSION = "1.1.0"
  LEDGER_SERVICE_URL = "billie-platform-services-demo.internal:50051"
  S3_BUCKET_NAME="billie-applications-nonprod"

# =============================================================================
# HTTP service configuration
# =============================================================================

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

# =============================================================================
# Machine configuration
# =============================================================================

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
