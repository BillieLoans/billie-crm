syntax = "proto3";

package billie.marketing;

service MarketingService {
  rpc UpsertContact(UpsertContactRequest) returns (UpsertContactResponse);
  rpc UpdateContact(UpdateContactRequest) returns (CommandResponse);
  rpc SetConsent(SetConsentRequest) returns (CommandResponse);
  rpc LogInteraction(LogInteractionRequest) returns (CommandResponse);
  rpc EraseContact(EraseContactRequest) returns (CommandResponse);

  // Resolve two contact records to one person. The survivor keeps its
  // contact_id; the other record's interactions/feedback/referrals re-attach
  // and it is tombstoned with a merged_into pointer. Consent resolves
  // conservatively (an opt-out on either record wins).
  rpc MergeContact(MergeContactRequest) returns (CommandResponse);

  // Manual contact<->customer linking from the CRM (staff command). The
  // matcher links automatically on mobile/email; these cover the cases it
  // can't, and undo. Emitted events carry match_basis/reason = "manual".
  rpc LinkContact(LinkContactRequest) returns (CommandResponse);
  rpc UnlinkContact(UnlinkContactRequest) returns (CommandResponse);

  // Phase 3 DSR: subject-access export — everything the marketing facet holds
  // about one contact, as a JSON document (admin-gated in the CRM).
  rpc ExportContact(ExportContactRequest) returns (ExportContactResponse);

  // Phase 2 (Stream A) — batches + invites
  rpc CreateBatch(CreateBatchRequest) returns (CreateBatchResponse);
  rpc AssignBatch(AssignBatchRequest) returns (AssignBatchResponse);
  rpc TriggerBatchInvitations(TriggerBatchInvitationsRequest) returns (TriggerBatchInvitationsResponse);

  // Phase 2 (Stream A) — feedback intake + triage
  rpc SubmitFeedback(SubmitFeedbackRequest) returns (SubmitFeedbackResponse);
  rpc SetFeedbackStatus(SetFeedbackStatusRequest) returns (SetFeedbackStatusResponse);
}

message ConsentCapture {
  bool granted = 1;
  repeated string channels = 2;
  string method = 3;
}

message UpsertContactRequest {
  string idempotency_key = 1;
  string first_name = 2;
  string email = 3;
  string mobile = 4;
  string city = 5;
  string postcode = 6;
  string source = 7;
  string utm_json = 8;              // JSON object as string
  repeated string platforms = 9;
  string channel_preference = 10;
  string referred_by_code = 11;
  bool waitlist = 12;
  ConsentCapture consent = 13;
  string actor = 14;
}

message UpsertContactResponse {
  string contact_id = 1;
  string event_id = 2;
  bool created = 3;
  bool idempotent_replay = 4;
}

message UpdateContactRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string first_name = 3;
  string email = 4;
  string mobile = 5;
  string city = 6;
  string postcode = 7;
  string channel_preference = 8;
  string attributes_json = 9;
  string actor = 10;
}

message SetConsentRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  bool granted = 3;
  repeated string channels = 4;
  string method = 5;
  string evidence = 6;
  string actor = 7;
}

message LogInteractionRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string kind = 3;
  string channel = 4;
  string direction = 5;
  string subject = 6;
  string body = 7;
  string source_system = 8;
  string occurred_at = 9;           // ISO-8601; empty = now
  string metadata_json = 10;
  string actor = 11;
}

message EraseContactRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string actor = 3;
}

message MergeContactRequest {
  string idempotency_key = 1;
  string survivor_contact_id = 2;
  string merged_contact_id = 3;
  string actor = 4;
}

message LinkContactRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string customer_id = 3;
  string actor = 4;
}

message UnlinkContactRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string actor = 3;
}

message ExportContactRequest {
  string contact_id = 1;
  string actor = 2;
}

message ExportContactResponse {
  string contact_id = 1;
  string export_json = 2;           // the full subject-access document
  string generated_at = 3;
}

message CommandResponse {
  string contact_id = 1;
  string event_id = 2;
  bool idempotent_replay = 3;
}

// ── Phase 2 (Stream A): batches + invites ──────────────────────────────

message CreateBatchRequest {
  string idempotency_key = 1;
  string name = 2;
  string criteria_json = 3;         // JSON object as string (segment snapshot)
  string actor = 4;
}

message CreateBatchResponse {
  string batch_id = 1;
  string event_id = 2;
  bool idempotent_replay = 3;
}

message AssignBatchRequest {
  string idempotency_key = 1;
  string batch_id = 2;
  repeated string contact_ids = 3;  // from a filtered CRM segment
  string actor = 4;
}

message AssignBatchResponse {
  string batch_id = 1;
  int32 assigned_count = 2;
  string event_id = 3;              // last emitted contact.batch.assigned.v1
  bool idempotent_replay = 4;
}

message TriggerBatchInvitationsRequest {
  string idempotency_key = 1;
  string batch_id = 2;
  string actor = 3;
}

message TriggerBatchInvitationsResponse {
  string batch_id = 1;
  int32 invited_count = 2;          // consented members a dispatch was emitted for
  int32 skipped_unconsented = 3;    // members skipped for lack of marketing consent
  bool idempotent_replay = 4;
  int32 skipped_needs_review = 5;   // members skipped because attributes.needs_review is set
}

// ── Phase 2 (Stream A): feedback ───────────────────────────────────────

message SubmitFeedbackRequest {
  string idempotency_key = 1;
  string contact_id = 2;
  string customer_id = 3;           // optional canonical link if already a customer
  string type = 4;                  // bug | praise | feature | complaint | ...
  string severity = 5;              // optional
  string text = 6;
  string product_area = 7;          // optional
  string actor = 8;
}

message SubmitFeedbackResponse {
  string feedback_id = 1;
  string event_id = 2;
  bool idempotent_replay = 3;
}

message SetFeedbackStatusRequest {
  string idempotency_key = 1;
  string feedback_id = 2;
  string status = 3;                // new | acknowledged | resolved
  string actor = 4;
  string note = 5;                  // what was done — required by the CRM when resolving
}

message SetFeedbackStatusResponse {
  string feedback_id = 1;
  string event_id = 2;
  string status = 3;
  bool idempotent_replay = 4;
}
